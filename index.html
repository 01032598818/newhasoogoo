<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하수구·변기·싱크대 막힘 고압세척·배관내시경 전문업체</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #fffaf0;
      color: #000;
    }
    .title-wrap {
      text-align: center;
      line-height: 1.3;
      padding: 30px 20px 10px;
    }
    .title-wrap h1, .title-wrap h2 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 900;
      white-space: normal;
      overflow-wrap: break-word;
    }
    nav {
      background: #0077cc;
      text-align: center;
      padding: 10px 0;
      overflow-x: auto;
      white-space: nowrap;
    }
    nav a {
      display: inline-block;
      font-size: 1.5rem;
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    section {
      display: none;
      padding: 20px;
    }
    section.active {
      display: block;
    }
    img.full {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 30px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .gallery img {
      width: 300px;
      border-radius: 8px;
    }
    .business-footer {
      background: #eee;
      padding: 30px 20px;
      color: #555;
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.6;
      margin-top: 80px;
    }
  </style>
  <script>
    function showSection(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    window.onload = () => {
      showSection('home');
    };
  </script>
</head>
<body>
  <header>
    <div class="title-wrap">
      <h1>하수구·변기·싱크대</h1>
      <h2>고압세척·내시경 전문업체</h2>
    </div>
  </header>

  <nav>
    <a onclick="showSection('home')">홈</a>
    <a onclick="showSection('about')">회사소개</a>
    <a onclick="showSection('services')">공사영역</a>
    <a onclick="showSection('work')">시공사례</a>
  </nav>

  <section id="home" class="active">
    <div style="background:white; padding:30px 20px 50px; text-align:center;">
      <img src="images/home.jpg" alt="메인 이미지" class="full" />
    </div>
  </section>

  <div class="business-footer">
    상호 : <strong>하수구막힘변기막힘싱크대막힘</strong><br>
    대표번호 : 010-3683-7741<br>
    Copyright(C)2025 <strong>하수구막힘변기막힘싱크대막힘</strong> All rights reserved.
  </div>
</body>
</html>
