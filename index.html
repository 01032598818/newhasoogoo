      color: white;

      text-align: center;
      line-height: 1.6;
      margin-top: 40px;
      margin-bottom: 50px;
    }
    .phone {

      margin: 0 auto 50px;
      background: #0055aa;
      color: white;
      font-size: 1rem;
      font-weight: normal;
