
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하수구·변기·싱크대 막힘&nbsp;뚫음 고압세척·배관내시경 전문업체</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fffaf0;
      color: #000;
    }
    header {
      background: #004a94;
      color: white;
      padding: 24px 12px;
      font-size: 2.1rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.3;
      white-space: normal;
      overflow-wrap: break-word;
      
    }
    nav {
      background: #0077cc;
      text-align: center;
      padding: 10px 0;
      flex-wrap: nowrap;
      overflow-x: auto;
      white-space: normal;
    }
    nav a {
      font-size: 1.2rem;
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
    }
    section {
      display: none;
      padding: 10px 20px;
    }
    section.active {
      display: block;
    }
    img.full {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 10px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .gallery img {
      width: 300px;
      border-radius: 6px;
    }
    form {
      display: block;
      margin: 24px auto;
      padding: 0 16px;
      max-width: 500px;
    }
    form input, form textarea {
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      font-size: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    form button {
      width: 100%;
      padding: 12px;
      font-size: 0.75rem;
      background: #0073e6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .highlight-message {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      margin: 20px 0 10px;
    }
    .business-footer {
      background: #f0f0f0;
      font-size: 0.75rem;
      text-align: center;
      padding: 20px 10px 10px;
      line-height: 1.6;
    }
    .business-footer .bold {
      font-weight: bold;
    }
    .phone {
      display: block;
      margin: 20px auto;
      background: #0055aa;
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 16px 20px;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      max-width: 340px;
    }
  </style>
  <script>
    function showSection(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    window.onload = () => {
      showSection('home');
    };
  </script>
</head>
<body>
  <header>하수구·변기·싱크대 막힘&nbsp;뚫음<br>고압세척·배관내시경 전문업체</header>
  <nav>
    <a onclick="showSection('home')">홈</a>
    <a onclick="showSection('about')">회사소개</a>
    <a onclick="showSection('services')">공사영역</a>
    <a onclick="showSection('work')">시공사례</a>
    <a onclick="showSection('contact')">고객센터</a>
  </nav>

  <div class="highlight-message">
    막힌 곳,<br />
    시원하게 해결해드립니다!
  </div>

  <section id="home" class="active">
    <img src="images/home.jpg" alt="메인 이미지" class="full" />
  </section>
  <section id="about">
    <img src="images/about.jpg" alt="회사소개" class="full" />
    <img src="images/plumber.jpg" alt="배관 기사 사진" class="full" />
  </section>
  <section id="services">
    <img src="images/services.jpg" class="full" />
    <img src="images/work1.jpg" class="full" />
    <img src="images/work2.jpg" class="full" />
  </section>
  <section id="work">
    <div class="gallery">
      <img src="images/construction1.jpg" />
      <img src="images/construction2.jpg" />
      <img src="images/construction3.jpg" />
      <img src="images/construction4.jpg" />
      <img src="images/construction5.jpg" />
      <img src="images/construction6.jpg" />
      <img src="images/construction7.jpg" />
      <img src="images/construction8.jpg" />
      <img src="images/construction9.jpg" />
      <img src="images/construction10.jpg" />
    </div>
  </section>
  <section id="contact">
    <img src="images/contact.jpg" alt="고객센터" class="full" />
    <form action="https://formspree.io/f/xnndjbwk" method="POST">
      <input type="text" name="name" placeholder="이름" required />
      <input type="tel" name="phone" placeholder="연락처" required />
      <input type="email" name="email" placeholder="이메일" required />
      <textarea name="message" placeholder="문의 내용" required></textarea>
      <button type="submit">문의하기</button>
    </form>
  </section>

  <a href="tel:01032598818" class="phone">📞 010-3259-8818 전화하기</a>

  <div class="business-footer">
    상호 : <strong>하수구막힘변기막힘싱크대막힘</strong><br>
    대표번호 : 010-3259-8818<br>
    Copyright(C)2025 <strong>하수구막힘변기막힘싱크대막힘</strong> All rights reserved.
  </div>
</body>
</html>
