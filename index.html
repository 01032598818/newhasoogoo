  <meta name="description" content="군산 하수구·변기·싱크대 막힘 고압세척 배관내시경 최고의 전문가가 직접 방문하여 해결해 드립니다.">

  <!-- 스타일 -->
  <style>
    header {
      background: #004a94;
      color: white;
      padding: 20px 10px;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.6;
      word-break: keep-all;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      background: #0077cc;
      text-align: center;
      padding: 10px 5px;
    }

    nav a {
      font-size: 1rem;
      color: white;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      padding: 6px 10px;
    }

    section {
      display: none;
      padding: 20px;
    }

    section.active {
      display: block;
    }

    img.full {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 30px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .gallery img {
      width: 300px;
      border-radius: 8px;
    }

    .call-banner {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 30px 0 50px;
    }

    .call-button {
      display: flex;
      align-items: center;
      gap: 14px;
      background-color: #0055aa;
      color: white;
      font-size: 1.8rem;
      font-weight: 900;
      padding: 20px 28px;
      border-radius: 18px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: background 0.3s;
      white-space: nowrap;
    }

    .call-button:hover {
      background-color: #003f88;
    }

    .call-note, .highlight-message, .business-footer {
      text-align: center;
    }
  </style>

  <!-- 스크립트 -->
  <script>
    function showSection(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    window.onload = function() {
      showSection('home');
    };
  </script>
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh; background: #fffaf0;">

    <a href="tel:01036837741" title="전화 연결" style="position:absolute; bottom:10px; left:0; width:100%; height:130px; z-index:9999; display:block; cursor:pointer;"></a>
  </section>
