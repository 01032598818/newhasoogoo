
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="naver-site-verification" content="15f15575255d977b80ce57517dcbe0f1799f2a06" />

  <title>하수구·변기·싱크대 막힘 전문업체</title>
  <style>
    html, body {
      padding: 0;
      margin: 0;
      height: 100%;
      overflow-x: hidden;
    }
    body {
      font-family: Arial, sans-serif;
      background: #fffaf0;
      color: #000;
    }
    header {
      background: #004a94;
      color: white;
      padding: 20px 10px;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.6;
      word-break: keep-all;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      background: #0077cc;
      text-align: center;
      padding: 10px 5px;
    }
    nav a {
      font-size: 1rem;
      color: white;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      padding: 6px 10px;
    }
    section {
      display: none;
      padding: 20px;
    }
    section.active {
      display: block;
    }
    img.full {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 30px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .gallery img {
      width: 300px;
      border-radius: 8px;
    }
    .call-banner {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 30px 0 50px;
    }
    .call-button {
      display: flex;
      align-items: center;
      gap: 14px;
      background-color: #0055aa;
      color: white;
      font-size: 1.8rem;
      font-weight: 900;
      padding: 20px 28px;
      border-radius: 18px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: background 0.3s;
      white-space: nowrap;
    }
    .call-button:hover {
      background-color: #003f88;
    }
    .call-icon {
      display: inline-block;
      width: 28px;
      height: 28px;
      background: radial-gradient(circle at 30% 30%, #ff0000, #880000);
      -webkit-mask: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79a15.093 15.093 0 006.59 6.59l2.2-2.2a1 1 0 011.05-.24c1.12.37 2.33.57 3.54.57a1 1 0 011 1v3.5a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.21.2 2.42.57 3.54a1 1 0 01-.24 1.05l-2.2 2.2z"/></svg>') no-repeat center;
      mask: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79a15.093 15.093 0 006.59 6.59l2.2-2.2a1 1 0 011.05-.24c1.12.37 2.33.57 3.54.57a1 1 0 011 1v3.5a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.21.2 2.42.57 3.54a1 1 0 01-.24 1.05l-2.2 2.2z"/></svg>') no-repeat center;
      background-size: 100% 100%;
    }
    .call-note {
      font-size: 0.9rem;
      color: #000;
      margin-top: 10px;
      text-align: center;
    }
    .highlight-message {
      font-size: 1.125rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
      margin: 40px 0 30px;
    }
    .business-footer {
      font-size: 0.75rem;
      line-height: 1.5;
      color: #000;
      background: #f5f5f5;
      padding: 30px 12px 20px 12px;
      margin-top: 50px;
      text-align: center;
    }
    #about {
      background: url('images/bathroom-blur.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    .about-content {
      max-width: 720px;
      margin: 40px auto;
      padding: 40px 30px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
    }
    .signature {
      text-align: center;
      color: #555;
      font-size: 0.9em;
      margin-top: 3em;
    }
  </style>
</head>

</html>
