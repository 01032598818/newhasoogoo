<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하수구·변기·싱크대 막힘 고압세척·배관내시경 전문업체</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #fffaf0;
      color: #000;
    }
    .title-wrap {
      text-align: center;
      line-height: 1.3;
      padding: 30px 20px 10px;
    }
    .title-wrap h1, .title-wrap h2 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 900;
      white-space: normal;
      overflow-wrap: break-word;
    }
    nav {
      background: #0077cc;
      text-align: center;
      padding: 10px 0;
      overflow-x: auto;
      white-space: nowrap;
    }
    nav a {
      display: inline-block;
      font-size: 1.5rem;
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    section {
      display: none;
      padding: 20px;
    }
    section.active {
      display: block;
    }
    img.full {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 30px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .gallery img {
      width: 300px;
      border-radius: 8px;
    }
    .call-banner {
      text-align: center;
      margin: 0 auto 50px;
    }
    .call-banner a {
      display: inline-block;
      background-color: #0057b7;
      color: white;
      font-size: 1.6rem;
      font-weight: 900;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      padding: 18px 28px;
      border-radius: 20px;
      text-decoration: none;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
      white-space: nowrap;
    }
    .call-banner span {
      margin-left: 12px;
    }
    @media (max-width: 600px) {
      .title-wrap h1, .title-wrap h2 {
        font-size: 2rem;
      }
      nav a {
        font-size: 1.1rem;
      }
      .call-banner a {
        font-size: 1.3rem;
        padding: 16px 22px;
      }
    }
  </style>
  <script>
    function showSection(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    window.onload = () => {
      showSection('home');
    };
  </script>
</head>
<body>
  <header>
    <div class="title-wrap">
      <h1>하수구·변기·싱크대</h1>
      <h2>고압세척·내시경 전문업체</h2>
    </div>
  </header>

  <nav>
    <a onclick="showSection('home')">홈</a>
    <a onclick="showSection('about')">회사소개</a>
    <a onclick="showSection('services')">공사영역</a>
    <a onclick="showSection('work')">시공사례</a>
  </nav>

  <section id="home" class="active">
    <div style="background:white; padding:30px 20px 50px; text-align:center;">
      <img src="images/home.jpg" alt="메인 이미지" class="full" />
      <div class="call-banner">
        <a href="tel:01036837741">
          📞 <span>010-3683-7741 전화하기</span>
        </a>
      </div>
    </div>
  </section>

  <section id="contact">
    <img src="images/contact.jpg" alt="고객센터" class="full" />
    <form action="https://formspree.io/f/xnndjbwk" method="POST">
      <input type="text" name="name" placeholder="이름" required />
      <input type="tel" name="phone" placeholder="연락처" required />
      <input type="email" name="email" placeholder="이메일" required />
      <textarea name="message" placeholder="문의 내용" required></textarea>
      <button type="submit">문의하기</button>
    </form>
  </section>

  <div class="business-footer">
    상호 : <strong>하수구막힘변기막힘싱크대막힘</strong><br>
    대표번호 : 010-3683-7741<br>
    Copyright(C)2025 <strong>하수구막힘변기막힘싱크대막힘</strong> All rights reserved.
  </div>
</body>
</html>
