
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하수구·변기·싱크대 막힘 전문업체</title>
  <style>
    html, body {
      padding: 0;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    header {
      background: #004a94;
      color: white;
      padding: 20px;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.4;
    }
    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      background: #0077cc;
      padding: 8px 0;
    }
    nav a {
      font-size: 1rem;
      color: white;
      padding: 6px 8px;
      margin: 0 2px;
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
      cursor: pointer;
    }
    section {
      display: none;
      padding: 20px;
    }
    section.active {
      display: block;
    }
    img.full {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 20px;
    }
    .call-banner {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 30px 0;
    }
    .call-button {
      display: flex;
      align-items: center;
      gap: 14px;
      background-color: #0055aa;
      color: white;
      font-size: 1.5rem;
      font-weight: 900;
      padding: 16px 24px;
      border-radius: 16px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: background 0.3s;
      white-space: nowrap;
    }
    .call-button:hover {
      background-color: #003f88;
    }
    .call-icon {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle at 30% 30%, #ff0000, #880000);
      -webkit-mask: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79a15.093 15.093 0 006.59 6.59l2.2-2.2a1 1 0 011.05-.24c1.12.37 2.33.57 3.54.57a1 1 0 011 1v3.5a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.21.2 2.42.57 3.54a1 1 0 01-.24 1.05l-2.2 2.2z"/></svg>') no-repeat center;
      mask: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79a15.093 15.093 0 006.59 6.59l2.2-2.2a1 1 0 011.05-.24c1.12.37 2.33.57 3.54.57a1 1 0 011 1v3.5a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.21.2 2.42.57 3.54a1 1 0 01-.24 1.05l-2.2 2.2z"/></svg>') no-repeat center;
      background-size: 100% 100%;
    }
    .call-note {
      font-size: 0.85rem;
      color: #000;
      margin-top: 10px;
      text-align: center;
    }
    .highlight-message {
      font-size: 1.125rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
      margin-top: 40px;
    }
  </style>
  <script>
    function showSection(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    window.onload = () => {
      showSection('home');
    };
  </script>
</head>
<body>
  <header>
    하수구·변기·싱크대 막힘 전문업체<br />
    고압세척·배관내시경 전문업체
  </header>

  <nav>
    <a onclick="showSection('home')">홈</a>
    <a onclick="showSection('about')">회사소개</a>
    <a onclick="showSection('services')">공사영역</a>
    <a onclick="showSection('cases')">시공사례</a>
    <a onclick="showSection('contact')">고객센터</a>
  </nav>

  <section id="home" class="active">
    <img src="images/home.jpg" alt="메인 이미지" class="full" />
  </section>

  <section id="about">
    <img src="images/about.jpg" alt="회사소개" class="full" />
  </section>

  <section id="services">
    <img src="images/services.jpg" alt="공사영역" class="full" />
  </section>

  <section id="cases">
    <img src="images/work1.jpg" alt="시공사례" class="full" />
  </section>

  <section id="contact">
    <img src="images/contact.jpg" alt="고객센터" class="full" />
    <div class="call-banner">
      <a href="tel:01036837741" class="call-button">
        <span class="call-icon"></span> 010-3683-7741 전화하기
      </a>
      <div class="call-note">※ 모바일에서 버튼을 누르면 바로 전화 연결됩니다.</div>
    </div>
    <div class="highlight-message">
      막힌 곳,<br />시원하게 해결해드립니다!
    </div>
  </section>
</body>
</html>
