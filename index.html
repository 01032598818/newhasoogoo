<!DOCTYPE html>

<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap');
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fffaf0;
      color: #000;
    }
    header {
      padding: 0;
    }
    .top-banner {
      width: 100%;
      display: block;
    }
    nav {
      background: #0077cc;
      text-align: center;
      padding: 10px 0;
    }
    nav a {
      font-size: 1.5rem;
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    section {
      display: none;
      padding: 20px;
    }
    section.active {
      display: block;
    }
    img.full {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 30px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .gallery img {
      width: 300px;
      border-radius: 8px;
    }
    form {
      display: block;
      clear: both;
      margin: 30px auto;
      padding: 0 20px;
      max-width: 500px;
    }
    form input, form textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    form button {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      background: #0073e6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .highlight-message {
      font-size: 1.125rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
      margin: 40px 0 30px;
    }
    .phone {
      display: block;
      margin: 40px auto;
      width: 90%;
      max-width: 400px;
    }
    .business-footer {
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.6;
      margin-top: 80px;
      margin-bottom: 20px;
    }
    .business-footer .bold {
      font-weight: bold;
    }
    .notice-text {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      margin-bottom: 30px;
    }
  </style>
  <script>
    function showSection(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    window.onload = () => {
      showSection('home');
    };
  </script>
</head>

    <a onclick="showSection('contact')">고객센터</a>

</a>
<div class="notice-text">※ 모바일에서 버튼을 누르면 바로 전화 연결됩니다.</div>

  <div class="business-footer" style="color:#777;">

</div>
</body>
</html>
