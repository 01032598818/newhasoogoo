
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>하수구·변기·싱크대 막힘 전문업체</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fffaf0;
      color: #000;
    }
    header {
      background: #004a94;
      color: white;
      padding: 20px;
      font-size: 1.6rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.4;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      background: #0077cc;
      text-align: center;
      padding: 10px 0;
    }
    nav a {
      font-size: 1rem;
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }
    section {
      display: none;
      padding: 20px;
    }
    section.active {
      display: block;
    }
    img.full {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 30px;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .gallery img {
      width: 300px;
      border-radius: 8px;
    }
    form {
      display: block;
      clear: both;
      margin: 30px auto;
      padding: 0 20px;
      max-width: 500px;
    }
    form input, form textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    form button {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      background: #0073e6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .highlight-message {
      font-size: 1.125rem;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
      margin: 40px 0 30px;
    }
    .business-footer {
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.6;
      margin-top: 80px;
      margin-bottom: 20px;
    }
    .phone {
      display: block;
      margin: 40px auto;
      background: #0055aa;
      color: white;
      font-size: 1rem;
      font-weight: normal;
      padding: 14px 20px;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      max-width: 320px;
    }
    .call-banner {
      display: flex;
      justify-content: center;
      margin: 30px 0 50px;
    }
    .call-button {
      display: flex;
      align-items: center;
      gap: 14px;
      background-color: #0055aa;
      color: white;
      font-size: 1.8rem;
      font-weight: 900;
      padding: 20px 28px;
      border-radius: 18px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: background 0.3s;
      white-space: nowrap;
    }
    .call-button:hover {
      background-color: #003f88;
    }
    .call-icon {
      display: inline-block;
      width: 28px;
      height: 28px;
      background: radial-gradient(circle at 30% 30%, #ff0000, #880000);
      -webkit-mask: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79a15.093 15.093 0 006.59 6.59l2.2-2.2a1 1 0 011.05-.24c1.12.37 2.33.57 3.54.57a1 1 0 011 1v3.5a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.21.2 2.42.57 3.54a1 1 0 01-.24 1.05l-2.2 2.2z"/></svg>') no-repeat center;
      mask: url('data:image/svg+xml;utf8,<svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79a15.093 15.093 0 006.59 6.59l2.2-2.2a1 1 0 011.05-.24c1.12.37 2.33.57 3.54.57a1 1 0 011 1v3.5a1 1 0 01-1 1C9.61 21 3 14.39 3 6a1 1 0 011-1h3.5a1 1 0 011 1c0 1.21.2 2.42.57 3.54a1 1 0 01-.24 1.05l-2.2 2.2z"/></svg>') no-repeat center;
      background-size: 100% 100%;
    }
  </style>
  <script>
    function showSection(id) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    window.onload = () => {
      showSection('home');
    };
  </script>
</head>
<body>
  <header>
    하수구·변기·싱크대 막힘 전문업체<br />

  <nav>
    <a onclick="showSection('home')">홈</a>
    <a onclick="showSection('about')">회사소개</a>
    <a onclick="showSection('services')">공사영역</a>
    <a onclick="showSection('work')">시공사례</a>
  </nav>

  <section id="home" class="active">

<div class="call-banner">

    </div>
  
<div class="call-banner">

    </div>
  
<div class="call-banner">

    </div>
  
<div class="call-banner">
  <a href="tel:01036837741" class="call-button"><span class="call-icon"></span> 010-3683-7741 전화하기</a>
</div>

</section>

  <div class="highlight-message">
    막힌 곳,<br />

  <div class="business-footer">
